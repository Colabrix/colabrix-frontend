name: Deploy to Environments

on:
  push:
    branches:
      - main # Production deployment
      - staging # Staging deployment
      - dev # Development deployment
  pull_request:
    branches:
      - main
      - staging
      - dev

jobs:
  # Test job that runs for all branches
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test --if-present

      - name: Build application
        run: npm run build

      - name: Test build output
        run: |
          echo "Build completed successfully!"
          ls -la dist/
          echo "Ready for deployment to $(echo ${{ github.ref_name }} | tr '[:lower:]' '[:upper:]') environment"

  # Development environment (simulate deployment)
  deploy-dev:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/dev'
    environment: development
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate Development Deployment
        run: |
          echo "🚀 Deploying to DEVELOPMENT environment..."
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "✅ Development deployment simulation completed!"
          echo "Would deploy to: https://dev.colabrix.app"

      - name: Notify Slack - Development Deployment
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            COLOR="good"
            STATUS="✅ SUCCESS"
          else
            COLOR="danger"
            STATUS="❌ FAILED"
          fi

          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"🚀 Development Deployment ${STATUS}\",\"attachments\":[{\"color\":\"${COLOR}\",\"fields\":[{\"title\":\"Environment\",\"value\":\"Development\",\"short\":true},{\"title\":\"Branch\",\"value\":\"${{ github.ref_name }}\",\"short\":true},{\"title\":\"Commit\",\"value\":\"${{ github.sha }}\",\"short\":true},{\"title\":\"URL\",\"value\":\"https://dev.colabrix.app\",\"short\":true}]}]}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}

  # Staging environment (simulate deployment)
  deploy-staging:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/staging'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate Staging Deployment
        run: |
          echo "🚀 Deploying to STAGING environment..."
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "✅ Staging deployment simulation completed!"
          echo "Would deploy to: https://staging.colabrix.app"

      - name: Notify Slack - Staging Deployment
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            COLOR="good"
            STATUS="✅ SUCCESS"
          else
            COLOR="danger"
            STATUS="❌ FAILED"
          fi

          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"🚀 Staging Deployment ${STATUS}\",\"attachments\":[{\"color\":\"${COLOR}\",\"fields\":[{\"title\":\"Environment\",\"value\":\"Staging\",\"short\":true},{\"title\":\"Branch\",\"value\":\"${{ github.ref_name }}\",\"short\":true},{\"title\":\"Commit\",\"value\":\"${{ github.sha }}\",\"short\":true},{\"title\":\"URL\",\"value\":\"https://staging.colabrix.app\",\"short\":true}]}]}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}

  # Production environment (simulate deployment)
  deploy-production:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate Production Deployment
        run: |
          echo "🚀 Deploying to PRODUCTION environment..."
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "⚠️  PRODUCTION DEPLOYMENT - Handle with care!"
          echo "✅ Production deployment simulation completed!"
          echo "Would deploy to: https://colabrix.app"

      - name: Notify Slack - Production Deployment
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            COLOR="good"
            STATUS="✅ SUCCESS"
          else
            COLOR="danger"
            STATUS="❌ FAILED"
          fi

          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"🚨 Production Deployment ${STATUS}\",\"attachments\":[{\"color\":\"${COLOR}\",\"fields\":[{\"title\":\"Environment\",\"value\":\"🔴 PRODUCTION\",\"short\":true},{\"title\":\"Branch\",\"value\":\"${{ github.ref_name }}\",\"short\":true},{\"title\":\"Commit\",\"value\":\"${{ github.sha }}\",\"short\":true},{\"title\":\"URL\",\"value\":\"https://colabrix.app\",\"short\":true}]}]}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}

  # Security scan job
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security audit
        run: |
          npm audit --audit-level moderate
          echo "🔒 Security scan completed"

  # Notify completion
  notify:
    runs-on: ubuntu-latest
    needs: [test, deploy-dev, deploy-staging, deploy-production]
    if: always()
    steps:
      - name: Deployment Status
        run: |
          echo "📋 Deployment Summary:"
          echo "Environment: ${{ github.ref_name }}"
          echo "Status: ${{ needs.test.result }}"
          echo "Timestamp: $(date)"
          echo "🎉 Workflow completed!"

      - name: Notify Slack - Workflow Summary
        if: always()
        run: |
          # Determine overall workflow status
          if [ "${{ needs.test.result }}" == "success" ]; then
            if [ "${{ github.ref_name }}" == "main" ] && [ "${{ needs.deploy-production.result }}" == "success" ]; then
              COLOR="good"
              STATUS="✅ SUCCESS"
              ENV_STATUS="🔴 Production deployment completed"
            elif [ "${{ github.ref_name }}" == "staging" ] && [ "${{ needs.deploy-staging.result }}" == "success" ]; then
              COLOR="good"
              STATUS="✅ SUCCESS"
              ENV_STATUS="🟡 Staging deployment completed"
            elif [ "${{ github.ref_name }}" == "dev" ] && [ "${{ needs.deploy-dev.result }}" == "success" ]; then
              COLOR="good"
              STATUS="✅ SUCCESS"
              ENV_STATUS="🟢 Development deployment completed"
            else
              COLOR="warning"
              STATUS="⚠️ PARTIAL"
              ENV_STATUS="Tests passed, no deployment triggered"
            fi
          else
            COLOR="danger"
            STATUS="❌ FAILED"
            ENV_STATUS="Workflow failed during testing phase"
          fi

          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"📋 Workflow Summary ${STATUS}\",\"attachments\":[{\"color\":\"${COLOR}\",\"fields\":[{\"title\":\"Branch\",\"value\":\"${{ github.ref_name }}\",\"short\":true},{\"title\":\"Status\",\"value\":\"${ENV_STATUS}\",\"short\":true},{\"title\":\"Test Result\",\"value\":\"${{ needs.test.result }}\",\"short\":true},{\"title\":\"Timestamp\",\"value\":\"$(date)\",\"short\":true}]}]}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
